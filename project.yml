name: HomesteadPlanner
options:
  bundleIdPrefix: com.homesteadplanner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"

packages: {}

targets:
  HomesteadPlanner:
    type: application
    platform: iOS
    sources:
      - path: HomesteadPlanner
    resources:
      - path: HomesteadPlanner/Resources
        type: folder
      - path: HomesteadPlanner/Assets.xcassets
        type: folder
    coreData:
      path: HomesteadPlanner/HomesteadPlanner.xcdatamodeld
      currentVersion: HomesteadPlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homesteadplanner.app
        INFOPLIST_FILE: HomesteadPlanner/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: true
  HomesteadPlannerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HomesteadPlannerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homesteadplanner.app.tests
        SWIFT_EMIT_LOC_STRINGS: false
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: HomesteadPlanner
